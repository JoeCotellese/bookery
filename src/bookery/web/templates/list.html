{% extends "base.html" %}

{% block title %}Library - Bookery{% endblock %}

{% block content %}
<h1 class="page-title">Library</h1>
<div class="search-bar">
    <input type="search"
           name="q"
           placeholder="Search books..."
           value="{{ query.q }}"
           hx-get="{{ url_for('web.books') }}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#book-list"
           hx-include="this"
           hx-push-url="true">
</div>

<div id="book-list">
    {% include "_book_list.html" %}
</div>
{% endblock %}
