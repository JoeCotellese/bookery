<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bookery{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('web.static', filename='style.css') }}">
    <script src="{{ url_for('web.static', filename='htmx.min.js') }}"></script>
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header>
        <a class="logo" href="{{ url_for('web.books') }}">Bookery</a>
    </header>
    <main id="main">
        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
            <ul class="flashes" role="status" aria-live="polite">
                {% for category, message in messages %}
                <li class="flash flash-{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
